<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Collection — PlaneLOG</title>
<meta name="description" content="The PlaneLOG catalog — see which aircraft liveries you've caught and which rare ones are still on your list.">
<meta property="og:title" content="Your Collection — PlaneLOG">
<meta property="og:description" content="See which aircraft liveries you've caught and which rare ones are still on your list.">
<meta property="og:image" content="apple-touch-icon.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
/* ── COLLECTION CATALOG (page-specific layout) ── */
.shell { grid-template-columns: 1fr; }
aside { display: none; }
.cat-toolbar { gap: 18px; }
.cat-progress { font-size: 14px; color: var(--text2); font-family: var(--mono); }
.cat-progress strong { color: var(--accent); font-size: 17px; }
.cat-progress span { color: var(--text3); }
.cat-tabs { display: flex; gap: 6px; margin-left: auto; }
.cat-tab {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 5px 13px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.12s;
}
.cat-tab:hover { border-color: var(--accent); color: var(--accent); }
.cat-tab.active { background: var(--accent); border-color: var(--accent); color: #0e0e0f; font-weight: 600; }

.catalog { padding: 10px 24px 64px; }
.cat-group { margin-top: 30px; }
.cat-group-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.cat-logo {
  width: 120px; height: 48px;
  object-fit: contain;
  border-radius: 10px;
  background: #fff;
  padding: 6px 10px;
  flex-shrink: 0;
}
.cat-logo.mono {
  display: flex; align-items: center; justify-content: center;
  background: var(--bg3);
  color: var(--accent);
  font-family: var(--display);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 0.04em;
  padding: 0;
}
.cat-logo.emblem { width: 56px; padding: 5px; }
.cat-group-meta { min-width: 150px; }
.cat-group-name { font-family: var(--display); font-size: 18px; font-weight: 700; }
.cat-group-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
.cat-group-bar { flex: 1; max-width: 260px; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-left: auto; }
.cat-group-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.cat-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.cat-card {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--bg2);
}
.cat-card.caught { border-color: rgba(10,132,224,0.45); }
.cat-card .livery-card { background: transparent; }

/* Locked (not yet spotted): muted gradient silhouette, photo hidden, lock badge. */
.cat-card.uncaught .card-swatch { filter: grayscale(0.7) brightness(0.5); }
.cat-card.uncaught .swatch-photo { display: none; }
.cat-card.uncaught .card-airline,
.cat-card.uncaught .card-livery,
.cat-card.uncaught .card-type,
.cat-card.uncaught .card-tags { opacity: 0.5; }

.cat-lock {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 156px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.92);
  pointer-events: none;
  z-index: 2;
}
.cat-lock svg { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7)); }

/* Unlocked (spotted): quick "add your own photo" button. */
.cat-upload {
  position: absolute;
  top: 8px; left: 10px;
  z-index: 3;
  width: 28px; height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.5);
  color: rgba(255,255,255,0.85);
  cursor: pointer;
  transition: all 0.12s;
}
.cat-upload:hover { border-color: var(--accent); color: #fff; transform: scale(1.08); }
</style>
</head>
<body>

<div class="shell">

  <!-- NAV -->
  <nav>
    <a class="wordmark" href="index.html" style="cursor:pointer;text-decoration:none" title="Back to the archive"><img class="brand-logo" src="logo.png" alt="PlaneLOG" onerror="this.outerHTML='Plane<em>LOG</em>'"></a>
    <span class="page-tag">Collection</span>
    <div class="nav-search">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="globalSearch" placeholder="Search tail, airline, livery name…" oninput="applyFilters()">
    </div>
    <div class="nav-stats">
      <div class="nav-stat">
        <div class="nav-stat-n" id="statLiveries">—</div>
        <div class="nav-stat-l">caught</div>
      </div>
      <div class="nav-stat">
        <div class="nav-stat-n" id="statAirlines">—</div>
        <div class="nav-stat-l">airlines</div>
      </div>
      <div class="nav-stat">
        <div class="nav-stat-n" id="statDecades">—</div>
        <div class="nav-stat-l">military</div>
      </div>
    </div>
    <a class="nav-btn nav-btn-ghost" href="index.html" title="Back to the full archive">← Archive</a>
    <a class="nav-btn nav-btn-ghost" href="YourLiveries.html" title="Liveries you've submitted">Your liveries</a>
    <button class="nav-btn" onclick="openSubmit()">+ Submit livery</button>
  </nav>

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Airline</div>
      <div class="filter-group" id="airlineFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Aircraft type</div>
      <div class="filter-group" id="typeFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Era</div>
      <div class="era-chips" id="eraFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Tags</div>
      <div class="tag-cloud" id="tagFilters"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="main-toolbar cat-toolbar">
      <div class="cat-progress" id="catProgress"><strong>0</strong> caught</div>
      <div class="cat-tabs">
        <button class="cat-tab active" onclick="setCatFilter('all',this)">All</button>
        <button class="cat-tab" onclick="setCatFilter('airline',this)">Airlines</button>
        <button class="cat-tab" onclick="setCatFilter('military',this)">Military</button>
        <button class="cat-tab" onclick="setCatFilter('caught',this)">Caught</button>
      </div>
    </div>
    <div class="catalog" id="catalog"></div>
  </main>
</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-box" id="detailBox" role="dialog" aria-modal="true" aria-label="Livery details"></div>
</div>

<!-- SUBMIT OVERLAY -->
<div class="submit-overlay" id="submitOverlay" onclick="closeSubmit(event)">
  <div class="submit-box" role="dialog" aria-modal="true" aria-labelledby="submitTitle">
    <h2 id="submitTitle">Submit a livery</h2>
    <p id="submitDesc">Add a livery to your archive — saved locally in your browser.</p>
    <div class="form-grid">
      <div class="form-row">
        <label>Tail number</label>
        <input type="text" placeholder="N12345 / G-ABCD" id="sub-tail">
      </div>
      <div class="form-row">
        <label>Livery name</label>
        <input type="text" placeholder="e.g. Polished metal" id="sub-livery">
      </div>
    </div>
    <div class="form-row">
      <label>Airline</label>
      <input type="text" placeholder="e.g. United Airlines" id="sub-airline">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Aircraft type</label>
        <input type="text" placeholder="e.g. Boeing 737" id="sub-type">
      </div>
      <div class="form-row">
        <label>Era</label>
        <select id="sub-era">
          <option value="">Select era</option>
          <option>1950s</option><option>1960s</option><option>1970s</option>
          <option>1980s</option><option>1990s</option><option>2000s</option>
          <option>2010s</option><option>2020s</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Notes</label>
      <textarea placeholder="History, details, interesting facts about this livery…" id="sub-notes"></textarea>
    </div>
    <div class="form-row">
      <label>Tags (comma-separated)</label>
      <input type="text" placeholder="retro, bare metal, heritage" id="sub-tags">
    </div>
    <div class="form-row">
      <label>Color palette</label>
      <div class="color-inputs">
        <input type="color" id="sub-c1" value="#004B87" title="Primary">
        <input type="color" id="sub-c2" value="#FFFFFF" title="Secondary">
        <input type="color" id="sub-c3" value="#A2AAAD" title="Accent">
      </div>
    </div>
    <div class="form-row">
      <label>Photo</label>
      <div class="photo-upload">
        <img id="sub-photo-preview" class="photo-preview" alt="" style="display:none">
        <label class="photo-upload-btn">
          <input type="file" id="sub-photo" accept="image/*" onchange="onPhotoPick(event)" hidden>
          Choose image…
        </label>
        <button type="button" id="sub-photo-clear" class="photo-clear" onclick="clearPhoto()" style="display:none">Remove</button>
      </div>
      <div class="photo-hint">Upload your own shot of this aircraft. Leave blank to auto-load a photo by registration.</div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeSubmit()">Cancel</button>
      <button class="btn-submit" id="submitBtn" onclick="submitLivery()">Add livery</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
// ── COLLECTION PAGE (grouped catalog of caught vs. still-to-catch) ──
function buildSidebar() { renderSidebar(db.filter(l => inCollection(l.id))); }

const AIRLINE_IATA = {
  'United Airlines': 'UA',
  'American Airlines': 'AA',
  'Delta Air Lines': 'DL',
  'Southwest Airlines': 'WN',
  'British Airways': 'BA',
  'Pan Am': 'PA',
  'Lufthansa': 'LH',
  'Air France': 'AF',
  'KLM': 'KL',
  'Emirates': 'EK',
  'Qantas': 'QF',
  'Singapore Airlines': 'SQ',
  'Cathay Pacific': 'CX',
  'Japan Airlines': 'JL',
  'Virgin Atlantic': 'VS',
  'JetBlue': 'B6',
  'Alaska Airlines': 'AS',
  'Air Canada': 'AC',
  'Aer Lingus': 'EI',
  'Ryanair': 'FR',
  'Etihad Airways': 'EY',
  'Qatar Airways': 'QR',
  'Turkish Airlines': 'TK',
  'Finnair': 'AY',
  'All Nippon Airways': 'NH',
  'Korean Air': 'KE',
  'Asiana Airlines': 'OZ',
  'China Airlines': 'CI',
  'EVA Air': 'BR',
  'Thai Airways': 'TG',
  'Malaysia Airlines': 'MH',
  'Air India': 'AI',
  'Saudia': 'SV',
  'Air New Zealand': 'NZ',
  'LATAM': 'LA',
  'Avianca': 'AV',
  'Aeroméxico': 'AM',
  'Iberia': 'IB',
  'Swiss': 'LX',
  'Austrian Airlines': 'OS',
  'TAP Air Portugal': 'TP',
  'SAS Scandinavian Airlines': 'SK',
  'El Al': 'LY',
  'Hawaiian Airlines': 'HA',
  'Frontier Airlines': 'F9',
  'Vietnam Airlines': 'VN',
  'Philippine Airlines': 'PR',
  'Garuda Indonesia': 'GA',
  'Air China': 'CA',
  'China Southern': 'CZ',
  'Ethiopian Airlines': 'ET',
  'Icelandair': 'FI',
  'Aegean Airlines': 'A3',
  'easyJet': 'U2',
  'Wizz Air': 'W6',
  'Virgin Australia': 'VA',
  'Oman Air': 'WY',
  'Royal Air Maroc': 'AT',
  'SriLankan Airlines': 'UL',
};
let catFilter = 'all';

function monogram(name) {
  return name.split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

// Bundled logos for carriers the generic logo API gets wrong (Southwest, Pan Am) or
// can't supply (military branches have no IATA code).
const LOGO_OVERRIDES = {
  'Southwest Airlines': { src: 'logos/southwest.svg', emblem: true },
  'Pan Am':            { src: 'logos/panam.png',     emblem: true },
  'Royal Air Force':   { src: 'logos/raf.svg',       emblem: true },
  'U.S. Air Force':    { src: 'logos/usaf.svg',      emblem: false },
  'U.S. Navy':         { src: 'logos/usnavy.png',    emblem: true },
};

function logoHTML(group) {
  const monoFallback = `this.replaceWith(Object.assign(document.createElement('div'),{className:'cat-logo mono',textContent:'${esc(monogram(group.airline))}'}))`;
  const ov = LOGO_OVERRIDES[group.airline];
  if (ov) return `<img class="cat-logo${ov.emblem ? ' emblem' : ''}" src="${ov.src}" alt="${esc(group.airline)}" onerror="${monoFallback}">`;
  const iata = AIRLINE_IATA[group.airline];
  if (group.category === 'military' || !iata) return `<div class="cat-logo mono">${monogram(group.airline)}</div>`;
  const url = `https://images.daisycon.io/airline/?width=240&height=80&iata=${iata}`;
  return `<img class="cat-logo" src="${url}" alt="${esc(group.airline)}" onerror="${monoFallback}">`;
}

function setCatFilter(v, el) {
  catFilter = v;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  applyFilters();
}

// Quick "add your own photo" for a spotted (unlocked) livery — replaces the card image
// with the shot you took. Clears any seed-photo credit since it's now your photo.
function catUploadPhoto(id, e) {
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!file) return;
  readImageFile(file, dataUrl => {
    const l = db.find(x => x.id === id);
    if (!l) return;
    l.photo = dataUrl;
    delete l.credit;
    save();
    applyFilters();
  });
}

// Renders the grouped collection catalog. (Named applyFilters so shared detail/collect code refreshes it.)
function applyFilters() {
  const q = document.getElementById('globalSearch').value.toLowerCase().trim();
  const matches = l => !q || [l.airline, l.tail, l.livery, ...(l.tags || []), l.notes].join(' ').toLowerCase().includes(q);

  const total = db.length;
  const caughtTotal = db.filter(l => inCollection(l.id)).length;
  document.getElementById('catProgress').innerHTML =
    `<strong>${caughtTotal}</strong> caught · <span>${total - caughtTotal} to go</span>`;
  document.getElementById('statLiveries').textContent = caughtTotal;
  document.getElementById('statAirlines').textContent = new Set(db.filter(l => (l.category || 'airline') === 'airline').map(l => l.airline)).size;
  document.getElementById('statDecades').textContent = db.filter(l => (l.category || 'airline') === 'military').length;

  let pool = db.filter(matches);
  if (catFilter === 'airline') pool = pool.filter(l => (l.category || 'airline') === 'airline');
  else if (catFilter === 'military') pool = pool.filter(l => (l.category || 'airline') === 'military');
  else if (catFilter === 'caught') pool = pool.filter(l => inCollection(l.id));

  const container = document.getElementById('catalog');
  if (!pool.length) {
    container.innerHTML = `<div class="empty-state"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35"/><circle cx="11" cy="11" r="8"/></svg><h3>${catFilter === 'caught' ? 'No catches yet' : 'Nothing here'}</h3><p>${catFilter === 'caught' ? 'Tap the ☆ on any aircraft to log it as caught.' : 'Try a different search or section.'}</p></div>`;
    return;
  }

  const groups = {};
  for (const l of pool) {
    const g = groups[l.airline] || (groups[l.airline] = { airline: l.airline, category: l.category || 'airline', items: [] });
    g.items.push(l);
  }
  const keys = Object.keys(groups).sort((a, b) => {
    const ga = groups[a], gb = groups[b];
    if (ga.category !== gb.category) return ga.category === 'military' ? 1 : -1; // airlines first, military last
    return a.localeCompare(b);
  });

  container.innerHTML = keys.map(k => {
    const g = groups[k];
    const items = g.items.slice().sort((a, b) => a.livery.localeCompare(b.livery));
    const caughtN = items.filter(l => inCollection(l.id)).length;
    const pct = Math.round(caughtN / items.length * 100);
    const cards = items.map(l => {
      const caught = inCollection(l.id);
      const overlay = caught
        ? `<label class="cat-upload" title="Add a photo you took" onclick="event.stopPropagation()">
             <input type="file" accept="image/*" onchange="catUploadPhoto(${l.id}, event)" hidden>
             <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
           </label>`
        : `<div class="cat-lock" title="Not yet spotted — tap the ☆ when you catch it">
             <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
           </div>`;
      return `<div class="cat-card ${caught ? 'caught' : 'uncaught'}">${cardHTML(l)}${overlay}</div>`;
    }).join('');
    return `
      <section class="cat-group">
        <div class="cat-group-head">
          ${logoHTML(g)}
          <div class="cat-group-meta">
            <div class="cat-group-name">${esc(g.airline)}</div>
            <div class="cat-group-sub">${g.category === 'military' ? 'Military' : 'Airline'} · ${caughtN}/${items.length} caught</div>
          </div>
          <div class="cat-group-bar"><div class="cat-group-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="cat-cards">${cards}</div>
      </section>`;
  }).join('');
  hydratePhotos(container);
}

// ── INIT ──
buildSidebar();
applyFilters();
</script>
</body>
</html>
