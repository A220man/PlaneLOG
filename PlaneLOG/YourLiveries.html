<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Liveries — PlaneLOG</title>
<meta name="description" content="The aircraft liveries you've submitted to PlaneLOG — your own spotted-and-logged archive.">
<meta property="og:title" content="Your Liveries — PlaneLOG">
<meta property="og:description" content="The aircraft liveries you've submitted to PlaneLOG.">
<meta property="og:image" content="apple-touch-icon.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="shell">

  <!-- NAV -->
  <nav>
    <button class="nav-toggle" onclick="toggleSidebar()" aria-label="Toggle filters" title="Filters">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a class="wordmark" href="index.html" style="cursor:pointer;text-decoration:none" title="Back to the archive"><img class="brand-logo" src="logo.png" alt="PlaneLOG" onerror="this.outerHTML='Plane<em>LOG</em>'"></a>
    <span class="page-tag">Your liveries</span>
    <div class="nav-search">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="globalSearch" placeholder="Search tail, airline, livery name…" oninput="applyFilters()">
    </div>
    <div class="nav-stats">
      <div class="nav-stat">
        <div class="nav-stat-n" id="statLiveries">—</div>
        <div class="nav-stat-l">liveries</div>
      </div>
      <div class="nav-stat">
        <div class="nav-stat-n" id="statAirlines">—</div>
        <div class="nav-stat-l">airlines</div>
      </div>
      <div class="nav-stat">
        <div class="nav-stat-n" id="statDecades">—</div>
        <div class="nav-stat-l">decades</div>
      </div>
    </div>
    <a class="nav-btn nav-btn-ghost" href="index.html" title="Back to the full archive">← Archive</a>
    <a class="nav-btn nav-btn-ghost" href="Collection.html" title="Liveries you've collected">Collection</a>
    <button class="nav-btn" onclick="openSubmit()">+ Submit livery</button>
  </nav>

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-clear">
      <button id="clearFilters" class="clear-filters-btn" onclick="clearFilters()" disabled>
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Clear filters
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Airline</div>
      <div class="filter-group" id="airlineFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Aircraft type</div>
      <div class="filter-group" id="typeFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Era</div>
      <div class="era-chips" id="eraFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Tags</div>
      <div class="tag-cloud" id="tagFilters"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="main-toolbar">
      <div class="result-count" id="resultCount"><strong>—</strong> liveries</div>
      <div class="sort-row">
        <span class="sort-label">Sort:</span>
        <button class="sort-btn active" onclick="setSort('airline',this)">Airline</button>
        <button class="sort-btn" onclick="setSort('era',this)">Era</button>
        <button class="sort-btn" onclick="setSort('type',this)">Aircraft</button>
        <button class="sort-btn" onclick="setSort('newest',this)" title="Upload date, newest first">Newest</button>
        <button class="sort-btn" onclick="setSort('oldest',this)" title="Upload date, oldest first">Oldest</button>
        <div class="view-btns">
          <button class="view-btn active" title="Grid view" onclick="setView('grid',this)">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" title="List view" onclick="setView('list',this)">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="livery-grid" id="liveryGrid"></div>
  </main>
</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-box" id="detailBox" role="dialog" aria-modal="true" aria-label="Livery details"></div>
</div>

<!-- SUBMIT OVERLAY -->
<div class="submit-overlay" id="submitOverlay" onclick="closeSubmit(event)">
  <div class="submit-box" role="dialog" aria-modal="true" aria-labelledby="submitTitle">
    <h2 id="submitTitle">Submit a livery</h2>
    <p id="submitDesc">Add a livery to your archive — saved locally in your browser.</p>
    <div class="form-grid">
      <div class="form-row">
        <label>Tail number</label>
        <input type="text" placeholder="N12345 / G-ABCD" id="sub-tail">
      </div>
      <div class="form-row">
        <label>Livery name</label>
        <input type="text" placeholder="e.g. Polished metal" id="sub-livery">
      </div>
    </div>
    <div class="form-row">
      <label>Airline</label>
      <input type="text" placeholder="e.g. United Airlines" id="sub-airline">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Aircraft type</label>
        <input type="text" placeholder="e.g. Boeing 737" id="sub-type">
      </div>
      <div class="form-row">
        <label>Era</label>
        <select id="sub-era">
          <option value="">Select era</option>
          <option>1950s</option><option>1960s</option><option>1970s</option>
          <option>1980s</option><option>1990s</option><option>2000s</option>
          <option>2010s</option><option>2020s</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Notes</label>
      <textarea placeholder="History, details, interesting facts about this livery…" id="sub-notes"></textarea>
    </div>
    <div class="form-row">
      <label>Tags (comma-separated)</label>
      <input type="text" placeholder="retro, bare metal, heritage" id="sub-tags">
    </div>
    <div class="form-row">
      <label>Color palette</label>
      <div class="color-inputs">
        <input type="color" id="sub-c1" value="#004B87" title="Primary">
        <input type="color" id="sub-c2" value="#FFFFFF" title="Secondary">
        <input type="color" id="sub-c3" value="#A2AAAD" title="Accent">
      </div>
    </div>
    <div class="form-row">
      <label>Photo</label>
      <div class="photo-upload">
        <img id="sub-photo-preview" class="photo-preview" alt="" style="display:none">
        <label class="photo-upload-btn">
          <input type="file" id="sub-photo" accept="image/*" onchange="onPhotoPick(event)" hidden>
          Choose image…
        </label>
        <button type="button" id="sub-photo-clear" class="photo-clear" onclick="clearPhoto()" style="display:none">Remove</button>
      </div>
      <div class="photo-hint">Upload your own shot of this aircraft. Leave blank to auto-load a photo by registration.</div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeSubmit()">Cancel</button>
      <button class="btn-submit" id="submitBtn" onclick="submitLivery()">Add livery</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
// ── YOUR LIVERIES PAGE (only the liveries you've submitted) ──
const EMPTY_NO_SUBMISSIONS = `<div class="empty-state"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg><h3>No liveries yet</h3><p>Liveries you submit will show up here.</p><button class="nav-btn" style="margin-top:12px" onclick="openSubmit()">+ Submit your first livery</button></div>`;

function buildSidebar() { renderSidebar(db.filter(isMine)); }

function applyFilters() {
  const mine = db.filter(isMine);
  const results = filterPool(mine);
  document.getElementById('statLiveries').textContent = mine.length;
  document.getElementById('statAirlines').textContent = new Set(mine.map(l => l.airline)).size;
  document.getElementById('statDecades').textContent = new Set(mine.map(l => l.era)).size;
  renderGrid(results, mine.length === 0 ? EMPTY_NO_SUBMISSIONS : EMPTY_NO_RESULTS);
}

// ── INIT ──
buildSidebar();
applyFilters();
</script>
</body>
</html>
